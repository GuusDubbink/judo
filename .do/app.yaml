name: judo
region: ams
services:
  - name: web
    environment_slug: node-js
    source_dir: /web
    github:
      repo: GuusDubbink/judo
      branch: master
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
