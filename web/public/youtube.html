<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Force an origin referer so YouTube accepts the embed inside the iOS
         WKWebView (a direct iframe fails there with "error 153"). -->
    <meta name="referrer" content="origin" />
    <title>Video</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <script>
      // Bundled YouTube embed proxy. The native app points its video iframe at
      // `/youtube.html?v=<id>`; this page — served from the app's own https
      // origin — embeds YouTube with a valid referer. Only a sanitised video id
      // is ever used, so there is nothing to inject.
      ;(function () {
        var params = new URLSearchParams(location.search)
        var id = (params.get('v') || '').replace(/[^A-Za-z0-9_-]/g, '')
        if (!id) return
        var noAutoplay = params.get('autoplay') === '0'
        var src =
          'https://www.youtube-nocookie.com/embed/' +
          id +
          '?rel=0&modestbranding=1&playsinline=1' +
          (noAutoplay ? '' : '&autoplay=1&mute=1')
        var frame = document.createElement('iframe')
        frame.src = src
        frame.title = 'YouTube video'
        frame.allow =
          'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share'
        frame.setAttribute('allowfullscreen', '')
        document.body.appendChild(frame)
      })()
    </script>
  </body>
</html>
